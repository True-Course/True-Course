<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Course</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f8fc;
color:#222;
}

header{
background:linear-gradient(135deg,#003b7a,#00a2ff);
color:white;
text-align:center;
padding:30px 20px;
}

header img{
width:220px;
max-width:90%;
background:white;
border-radius:15px;
padding:10px;
}

header h1{
margin-top:15px;
font-size:40px;
}

header p{
margin-top:10px;
}

/* --- Notification Bar Styling --- */
.notification-bar {
background: #ffcc00;
color: #003b7a;
padding: 12px 20px;
text-align: center;
font-weight: bold;
font-size: 16px;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
border-bottom: 2px solid #e6b800;
display: flex;
justify-content: center;
align-items: center;
gap: 10px;
}

.notification-bar span {
background: #d93838;
color: white;
padding: 3px 8px;
border-radius: 4px;
font-size: 12px;
text-transform: uppercase;
letter-spacing: 1px;
}

section{
padding:40px 20px;
max-width:1100px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:25px;
color:#003b7a;
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
text-align:center;
transition: transform 0.2s;
}

.card:hover {
transform: translateY(-5px);
}

.card h3{
margin-bottom:10px;
color:#003b7a;
}

.form-box{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
margin-bottom: 20px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#003b7a;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0054ad;
}

.contact{
text-align:center;
}

.whatsapp{
display:inline-block;
margin-top:15px;
background:#25D366;
color:white;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
}

/* --- Business Hours Box Styling --- */
.hours-box {
line-height: 1.8;
font-size: 16px;
}

#shop-status {
margin-top: 15px;
font-size: 22px;
font-weight: bold;
}

/* --- Customer Reviews Styling --- */
.reviews-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
gap: 20px;
margin-bottom: 25px;
}

.review-card {
background: white;
padding: 20px;
border-radius: 12px;
box-shadow: 0 4px 10px rgba(0,0,0,.05);
border-left: 5px solid #003b7a;
text-align: left;
}

.stars {
color: #ffcc00;
font-size: 18px;
margin-bottom: 8px;
}

.review
